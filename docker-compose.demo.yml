services:
  app-demo:
    image: jaysbeekay/hearth:latest
    ports:
      # Bind to localhost only — a reverse proxy (Caddy/nginx) in front of
      # this terminates TLS and proxies the public subdomain to here. See
      # README "Running a public demo instance".
      - "127.0.0.1:3001:3000"
    environment:
      DATABASE_URL: file:./data/app.db
      UPLOADS_DIR: ./data/uploads
      DEMO_MODE: "true"
      # A dedicated secret — never reuse the real instance's AUTH_SECRET,
      # since it's the JWT signing key and the two instances must not be
      # able to forge each other's sessions.
      AUTH_SECRET: ${DEMO_AUTH_SECRET}
      APP_URL: ${DEMO_APP_URL:-https://demo.example.com}
      AUTH_TRUST_HOST: "true"
      # SMTP/NTFY/OLLAMA/BARCODE/ENCRYPTION_KEY/BACKUP_* intentionally left
      # unset. Those features are gated off in demo mode anyway (see
      # README), and this instance should hold no real external credentials.
      CRON_SECRET: ""
      MCP_TOKEN: ""
    volumes:
      - ./data-demo:/app/data
    restart: unless-stopped
